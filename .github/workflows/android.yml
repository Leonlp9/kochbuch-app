name: CI – Build-Check

# Prueft bei jedem Push auf main, dass Web + Android noch bauen.
# Den echten Release (APK + OTA-Bundle) erledigt release.yml beim Tag-Push.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java (JDK 17) einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Abhaengigkeiten installieren
        run: npm install

      - name: Web-App bauen
        run: npm run build

      - name: Android-Plattform hinzufuegen (falls nicht im Repo)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Android-Projekt synchronisieren
        run: npx cap sync android

      - name: APK bauen (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

