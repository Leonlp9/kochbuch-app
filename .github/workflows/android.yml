name: Android APK bauen

on:
  push:
    branches: [main, master]
  workflow_dispatch: # erlaubt manuelles Starten ueber den Actions-Tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java (JDK 17) einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Abhaengigkeiten installieren
        run: npm install

      - name: Web-App bauen
        run: npm run build

      - name: Android-Plattform hinzufuegen
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: App-Icons generieren
        run: |
          if [ -f "resources/icon.png" ] || [ -f "resources/icon.jpg" ] || [ -f "resources/icon.jpeg" ] || [ -f "resources/icon.webp" ]; then
            npx @capacitor/assets generate --android
          else
            echo "Kein resources/icon.* gefunden - Standard-Icon bleibt aktiv."
          fi

      - name: Android-Projekt synchronisieren
        run: |
          npx cap sync android

      - name: APK bauen (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: kochbuch-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
